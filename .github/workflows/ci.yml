name: CI Proyecto Final

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests

      - name: Start services
        run: |
          docker compose up -d --build

      - name: Wait for gateway
        run: |
          for path in /auth/docs /rest/docs /graphql; do
            until curl -fsS "http://localhost${path}" > /dev/null; do
              sleep 5
            done
          done

      - name: Run Tests
        run: |
          python -m pytest tests